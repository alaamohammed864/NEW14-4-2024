const Badge = ({ children, color='blue' }) => {
    const colors = {
        blue:   'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300',
        green:  'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
        amber:  'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-300',
        purple: 'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300',
        gray:   'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300',
        red:    'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
        teal:   'bg-teal-100 text-teal-800 dark:bg-teal-900/30 dark:text-teal-300',
    };
    return <span className={`px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[color]||colors.gray}`}>{children}</span>;
};

const Button = ({ children, onClick, variant='primary', className='', icon, href, target }) => {
    const base = "inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2";
    const variants = {
        primary:   "bg-blue-600 hover:bg-blue-700 text-white shadow-lg focus:ring-blue-500",
        secondary: "bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-gray-500",
        success:   "bg-emerald-600 hover:bg-green-700 text-white shadow-lg focus:ring-green-500",
        danger:    "bg-red-600 hover:bg-red-700 text-white shadow-lg focus:ring-red-500",
        ghost:     "text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800",
        amber:     "bg-amber-500 hover:bg-amber-600 text-white shadow-lg focus:ring-amber-500",
    };
    if (href) return <a href={href} target={target||'_blank'} rel="noopener noreferrer" className={`${base} ${variants[variant]||variants.primary} ${className}`}>{icon}{children}</a>;
    return <button onClick={onClick} className={`${base} ${variants[variant]||variants.primary} ${className}`}>{icon}{children}</button>;
};

// Toast notification
const useToast = () => {
    const [toast, setToast] = useState(null);
    const show = (msg, type='success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2500);
    };
    const ToastEl = toast ? (
        <div className="toast" style={{background: toast.type==='error'?'#dc2626':'#1e293b'}}>
            {toast.msg}
        </div>
    ) : null;
    return { show, ToastEl };
};

// h_login
const LoginDemo = () => {
    const [phone, setPhone] = useState('');
    const [step, setStep] = useState('phone');
    const [otp, setOtp] = useState('');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const handleSend = () => {
        if (!/^07[0-9]{8}$/.test(phone)) { setError('رقم الهاتف يجب أن يبدأ بـ 07 ويتكون من 10 أرقام'); return; }
        setError(''); setLoading(true);
        setTimeout(() => { setLoading(false); setStep('otp'); }, 1500);
    };
    const handleVerify = () => {
        if (otp.length !== 6) { setError('الرمز يجب أن يكون 6 أرقام'); return; }
        setError(''); setLoading(true);
        setTimeout(() => { setLoading(false); setStep('done'); }, 1200);
    };
    if (step==='done') return (
        <div className="flex flex-col items-center justify-center h-64 gap-4">
            <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-3xl">✅</div>
            <p className="text-green-600 font-bold text-lg">تم تسجيل الدخول بنجاح!</p>
            <Button variant="secondary" onClick={()=>{setStep('phone');setPhone('');setOtp('');}}>تسجيل الخروج</Button>
        </div>
    );
    return (
        <div className="space-y-4 max-w-xs mx-auto py-4">
            <h3 className="text-center font-bold text-lg">{step==='phone'?'تسجيل الدخول':'رمز التحقق'}</h3>
            {step==='phone' ? (
                <>
                    <div className="flex border border-gray-300 dark:border-gray-600 rounded-xl overflow-hidden">
                        <span className="bg-gray-100 dark:bg-gray-700 px-3 flex items-center text-sm font-mono text-gray-600 dark:text-gray-300 border-l border-gray-300 dark:border-gray-600">🇮🇶 +964</span>
                        <input type="tel" placeholder="07XXXXXXXXX" value={phone} onChange={e=>setPhone(e.target.value)} maxLength={10}
                            className="flex-1 px-3 py-3 bg-white dark:bg-gray-800 outline-none text-sm"/>
                    </div>
                    {error && <p className="text-red-500 text-xs">{error}</p>}
                    <Button variant="primary" className="w-full" onClick={handleSend}>
                        {loading ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> جارٍ الإرسال...</> : 'إرسال رمز التحقق'}
                    </Button>
                    <p className="text-center text-xs text-gray-500">
                        <a href="https://firebase.google.com/docs/auth/web/phone-auth" target="_blank" className="text-blue-500 hover:underline flex items-center justify-center gap-1">
                            <Icon name="external" className="w-3 h-3"/> مصادقة Firebase
                        </a>
                    </p>
                </>
            ) : (
                <>
                    <p className="text-center text-sm text-gray-500">تم إرسال الرمز إلى: <span className="font-bold">+964 {phone}</span></p>
                    <input type="text" placeholder="------" value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/,''))} maxLength={6}
                        className="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 text-center text-2xl tracking-widest bg-white dark:bg-gray-800 outline-none"/>
                    {error && <p className="text-red-500 text-xs text-center">{error}</p>}
                    <Button variant="success" className="w-full" onClick={handleVerify}>
                        {loading ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> جارٍ التحقق...</> : 'تحقق من الرمز'}
                    </Button>
                    <button className="w-full text-xs text-gray-500 hover:text-blue-500" onClick={()=>setStep('phone')}>← تغيير الرقم</button>
                </>
            )}
        </div>
    );
};

// h_calc — Loan Calculator
const CalcDemo = () => {
    const [amount, setAmount] = useState(50);
    const [years, setYears] = useState(10);
    const [rate, setRate] = useState(5);
    const monthly = useMemo(() => {
        const r = rate / 100 / 12;
        const n = years * 12;
        if (r===0) return (amount * 1e6) / n;
        return (amount * 1e6 * r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
    }, [amount, years, rate]);
    const total = monthly * years * 12;
    const interest = total - amount * 1e6;
    const pct = Math.round((interest / total) * 100);
    const fmt = n => n >= 1e6 ? (n/1e6).toFixed(2)+' م' : Math.round(n).toLocaleString('ar-IQ');
    return (
        <div className="space-y-5">
            <div className="space-y-1">
                <div className="flex justify-between text-sm"><span>مبلغ القرض</span><span className="font-bold text-blue-600">{amount} مليون د.ع</span></div>
                <input type="range" min={10} max={100} step={5} value={amount} onChange={e=>setAmount(+e.target.value)} className="w-full"/>
            </div>
            <div className="space-y-1">
                <div className="flex justify-between text-sm"><span>مدة السداد</span><span className="font-bold text-blue-600">{years} سنة</span></div>
                <input type="range" min={5} max={20} step={1} value={years} onChange={e=>setYears(+e.target.value)} className="w-full"/>
            </div>
            <div className="space-y-1">
                <div className="flex justify-between text-sm"><span>نسبة الفائدة</span><span className="font-bold text-blue-600">{rate}%</span></div>
                <input type="range" min={1} max={12} step={0.5} value={rate} onChange={e=>setRate(+e.target.value)} className="w-full"/>
            </div>
            <div className="bg-gradient-to-r from-emerald-500 to-blue-600 rounded-2xl p-4 text-white">
                <p className="text-xs opacity-80">القسط الشهري</p>
                <p className="text-3xl font-bold mt-1">{Math.round(monthly).toLocaleString('ar-IQ')} <span className="text-lg">د.ع</span></p>
                <div className="mt-3 grid grid-cols-2 gap-2 text-xs">
                    <div className="bg-white/10 rounded-lg p-2"><p className="opacity-70">إجمالي الأقساط</p><p className="font-bold">{fmt(total)} د.ع</p></div>
                    <div className="bg-white/10 rounded-lg p-2"><p className="opacity-70">الفوائد الكلية</p><p className="font-bold">{fmt(interest)} د.ع</p></div>
                </div>
            </div>
            <div className="flex items-center gap-3">
                <div className="relative w-16 h-16 flex-shrink-0">
                    <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e5e7eb" strokeWidth="3.5"/>
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2563eb" strokeWidth="3.5"
                            strokeDasharray={`${pct} ${100-pct}`} strokeLinecap="round"/>
                    </svg>
                    <span className="absolute inset-0 flex items-center justify-center text-xs font-bold">{pct}%</span>
                </div>
                <div className="text-xs space-y-1">
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-blue-600 inline-block"></span> فوائد: {pct}%</div>
                    <div className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-gray-300 inline-block"></span> أصل: {100-pct}%</div>
                </div>
            </div>
        </div>
    );
};

        { id:'d3', name:'عقد البيع الأولي',        uploaded: false, file: null },
    ]);
    const [uploading, setUploading] = useState(null);
    const fileRef = useRef({});
    const handleUpload = (id, e) => {
        const f = e.target.files[0]; if (!f) return;
        setUploading(id);
        setTimeout(()=>{
            setDocs(prev=>prev.map(d=>d.id===id?{...d,uploaded:true,file:f.name}:d));
            setUploading(null);
        }, 1500);
    };
    const handleDelete = id => setDocs(prev=>prev.map(d=>d.id===id?{...d,uploaded:false,file:null}:d));
    const done = docs.filter(d=>d.uploaded).length;
    return (
        <div className="space-y-3">
            <div className="flex items-center gap-2 mb-2">
                <div className="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div className="bg-green-500 h-2 rounded-full transition-all" style={{width:`${(done/docs.length)*100}%`}}></div>
                </div>
                <span className="text-sm text-gray-600 dark:text-gray-400">{done}/{docs.length}</span>
            </div>
            {docs.map(doc=>(
                <div key={doc.id} className="flex items-center gap-3 p-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-white dark:bg-gray-800">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${doc.uploaded?'bg-green-100 dark:bg-green-900/30':'bg-gray-100 dark:bg-gray-700'}`}>
                        {doc.uploaded ? '✅' : '📄'}
                    </div>
                    <div className="flex-1 min-w-0">
                        <p className="font-medium text-sm">{doc.name}</p>
                        {doc.uploaded && <p className="text-xs text-gray-500 truncate">{doc.file}</p>}
                        {uploading===doc.id && <div className="w-full bg-gray-200 rounded-full h-1.5 mt-1"><div className="bg-blue-600 h-1.5 rounded-full animate-pulse" style={{width:'60%'}}></div></div>}
                    </div>
                    {doc.uploaded ? (
                        <button onClick={()=>handleDelete(doc.id)} className="text-red-400 hover:text-red-600 p-1"><Icon name="trash" className="w-4 h-4"/></button>
                    ) : (
                        <>
                            <input type="file" accept="image/*,application/pdf" ref={el=>fileRef.current[doc.id]=el} onChange={e=>handleUpload(doc.id,e)} className="hidden"/>
                            <button onClick={()=>fileRef.current[doc.id]?.click()}
                                className="text-xs px-3 py-1.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-lg hover:bg-blue-100 flex items-center gap-1">
                                <Icon name="camera" className="w-3 h-3"/> رفع
                            </button>
                        </>
                    )}
                </div>
            ))}
            {done===docs.length && (
                <div className="text-center p-3 bg-green-50 dark:bg-green-900/20 rounded-xl border border-green-200">
                    <p className="text-green-700 dark:text-green-300 font-bold">✅ جميع المستندات مكتملة!</p>
                </div>
            )}
        </div>
    );
};

    const colorMap = { full:'#ef4444', partial:'#3b82f6', empty:'#22c55e' };
    const labelMap = { full:'ممتلئ', partial:'جزئي', empty:'فارغ' };
    const rows = ['A','B','C'];
    const cols = [1,2,3];
    return (
        <div className="space-y-4">
            <div className="flex gap-3 text-xs flex-wrap">
                {Object.entries(labelMap).map(([k,v])=>(
                    <div key={k} className="flex items-center gap-1">
                        <span className="w-3 h-3 rounded inline-block" style={{background:colorMap[k]}}></span> {v}
                    </div>
                ))}
            </div>
            <div className="bg-gray-100 dark:bg-gray-800 rounded-2xl p-4">
                <p className="text-xs text-center text-gray-400 mb-3">🚪 مدخل المستودع</p>
                <div className="grid grid-cols-3 gap-3">
                    {rows.map(r=>cols.map(c=>{
                        const s = APP_DATA.warehouseMap.find(x=>x.shelf===`${r}${c}`);
                        if(!s) return null;
                        return (
                            <button key={s.shelf} onClick={()=>setSelected(selected===s.shelf?null:s.shelf)}
                                className={`rounded-xl p-3 border-2 transition-all text-center ${selected===s.shelf?'border-gray-800 dark:border-white scale-105':'border-transparent'}`}
                                style={{background:colorMap[s.status]+'33',borderColor:selected===s.shelf?undefined:colorMap[s.status]}}>
                                <p className="font-bold text-sm">{s.shelf}</p>
                                <p className="text-xs text-gray-600 dark:text-gray-400">{s.items}/{s.capacity}</p>
                            </button>
                        );
                    }))}
                </div>
                <p className="text-xs text-center text-gray-400 mt-3">📦 منطقة التحميل والتفريغ</p>
            </div>
            {selected && (() => {
                const s = APP_DATA.warehouseMap.find(x=>x.shelf===selected);
                const items = APP_DATA.inventory.slice(0, s.items>0?Math.min(3,s.items):0);
                return (
                    <div className="bg-white dark:bg-gray-800 rounded-xl p-3 border border-gray-200 dark:border-gray-700">
                        <p className="font-bold text-sm mb-2">رف {s.shelf} — {labelMap[s.status]} ({s.items}/{s.capacity})</p>
                        {items.length>0 ? items.map(i=>(
                            <div key={i.id} className="flex justify-between text-xs py-1 border-b border-gray-100 dark:border-gray-700 last:border-0">
                                <span>{i.name}</span><span className="font-mono text-gray-500">{i.qty} {i.unit}</span>
                            </div>
                        )) : <p className="text-xs text-gray-400">الرف فارغ</p>}
                    </div>
                );
            })()}
        </div>
    );
};

// l_report
const ReportDemo = () => {
    const [type, setType] = useState('يومي');
    const [format, setFormat] = useState('PDF');
    const [preview, setPreview] = useState(false);
    const [generating, setGenerating] = useState(false);
    const generate = () => {
        setGenerating(true);
        setTimeout(()=>{setGenerating(false);setPreview(true);},1500);
    };
    const inv = APP_DATA.inventory;
    return (
        <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
                <div>
                    <label className="text-xs text-gray-500 mb-1 block">نوع التقرير</label>
                    <select value={type} onChange={e=>setType(e.target.value)} className="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2 text-sm bg-white dark:bg-gray-800 outline-none">
                        {['يومي','أسبوعي','شهري'].map(t=><option key={t}>{t}</option>)}
                    </select>
                </div>
                <div>
                    <label className="text-xs text-gray-500 mb-1 block">صيغة التصدير</label>
                    <select value={format} onChange={e=>setFormat(e.target.value)} className="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-3 py-2 text-sm bg-white dark:bg-gray-800 outline-none">
                        {['PDF','Excel','CSV'].map(f=><option key={f}>{f}</option>)}
                    </select>
                </div>
            </div>
            <Button variant="primary" className="w-full" onClick={generate}>
                {generating?<><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span> جارٍ التوليد...</>:<><Icon name="barChart" className="w-4 h-4"/> توليد التقرير</>}
            </Button>
            {preview && (
                <div className="border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
                    <div className="bg-gray-800 p-4 text-white text-sm flex justify-between items-center">
                        <span>📄 تقرير {type} — {new Date().toLocaleDateString('ar-IQ')}</span>
                        <Badge color="green">{format}</Badge>
                    </div>
                    <div className="p-4 bg-white dark:bg-gray-900 space-y-2">
                        <p className="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wide">ملخص المخزون</p>
                        <table className="w-full text-xs">
                            <thead><tr className="border-b border-gray-200 dark:border-gray-700">
                                <th className="text-right py-1 text-gray-500">المنتج</th>
                                <th className="text-center py-1 text-gray-500">الكمية</th>
                                <th className="text-left py-1 text-gray-500">الحالة</th>
                            </tr></thead>
                            <tbody>{inv.slice(0,5).map(i=>(
                                <tr key={i.id} className="border-b border-gray-100 dark:border-gray-800">
                                    <td className="py-1.5 truncate max-w-[120px]">{i.name}</td>
                                    <td className="py-1.5 text-center">{i.qty} {i.unit}</td>
                                    <td className="py-1.5 text-left"><span className={`text-[10px] px-1.5 py-0.5 rounded-full ${i.qty<i.min?'bg-red-100 text-red-600':'bg-green-100 text-green-600'}`}>{i.qty<i.min?'نقص':'جيد'}</span></td>
                                </tr>
                            ))}</tbody>
                        </table>
                        <Button variant="secondary" className="w-full mt-2 text-xs" icon={<Icon name="download" className="w-3 h-3"/>}
                            onClick={()=>alert(`سيتم تحميل تقرير ${type} بصيغة ${format} — هذه محاكاة`)}>
                            تحميل {format}
                        </Button>
                    </div>
                </div>
            )}
        </div>
    );

                    <h2 className="text-3xl font-bold text-amber-800 dark:text-amber-400 font-heading">📦 تتبع+</h2>
                    <p className="text-amber-700 dark:text-amber-300 mt-1">نظام إدارة المخزون واللوجستيات الذكي</p>
                </div>
                <div className="flex gap-2 flex-wrap">
                    <Badge color="purple">Flutter</Badge>
                    <Badge color="blue">PostgreSQL</Badge>
                    <Badge color="green">AI Forecast</Badge>
                    <a href="https://flutter.dev" target="_blank" className="text-xs text-blue-500 hover:underline flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> Docs</a>
                </div>
            </div>
            <div className="relative max-w-md">
                <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400"><Icon name="search" className="w-5 h-5"/></div>
                <input type="text" placeholder="بحث..." className="w-full pr-10 pl-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-amber-500 outline-none"
                    value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredLogistics.map(s=><ScreenCard key={s.id} screen={s} color="amber" iconName="layers"/>)}
            </div>
        </div>
    );

    const renderPrompts = () => (
        <div className="space-y-8 animate-fade-in max-w-5xl mx-auto">
            <div className="text-center mb-10">
                <h2 className="text-3xl font-bold font-heading mb-4">مكتبة البرومبتات الشاملة</h2>
                <p className="text-gray-600 dark:text-gray-400">استخدم هذه البرومبتات في ChatGPT-4 أو Claude للحصول على كود كامل للتطبيق.</p>
            </div>
            {[{
                title:'البرومبت الكامل: تطبيق المنزل الذكي', icon:'🏠', color:'emerald',
                text:`Act as a Senior React Native Developer. I need you to build a complete "Smart Home Loan App" for the Iraqi market.

PROJECT REQUIREMENTS:
1. Tech Stack: React Native (Expo), Node.js (Backend), PostgreSQL (Database).
2. Language: Arabic (RTL support is mandatory).
3. Authentication: Phone number login (+964) with OTP verification.

CORE FEATURES:
- Loan Calculator: Interactive sliders (10M-100M IQD, 5-20 years, 5% interest).
- Bank Integration: Mock API for Rafidain and Housing banks.
- Document Upload: Camera integration with compression.
- Contractor Marketplace: Grid view with ratings.
- Status Tracking: Vertical timeline component.

DELIVERABLES:
1. Project folder structure.
2. Database Schema (SQL).
3. Loan Calculator component code.
4. Vertical timeline component code.`
            },{
                title:'البرومبت الكامل: تطبيق تتبع+', icon:'📦', color:'amber',
                text:`Act as a Senior Flutter Developer. Build a "Logistics Asset Tracking App" called "Tatbaa+".

PROJECT REQUIREMENTS:
1. Tech Stack: Flutter, Firebase (Auth & DB), Google Maps API.
2. Target: Warehouse managers in Iraq.
3. Performance: Offline-first with sync.

CORE FEATURES:
- QR Scanner: mobile_scanner package with flashlight toggle.
- Inventory Dashboard: Real-time charts with low-stock alerts.
- AI Forecasting: UI for ML demand prediction (Python API).
- Warehouse Map: 2D SVG shelf map (A1, B2...).
- Reports: PDF generation for daily movements.

DELIVERABLES:
1. Flutter Clean Architecture structure.
2. Firebase Security Rules.
3. QR Scanner screen code.
4. Warehouse Map using flutter_svg.`
            }].map(({title,icon,color,text})=>{
                const [copied, setCopied] = useState(false);
                return (
                    <div key={title} className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
                        <div className={`bg-gradient-to-r from-${color}-600 to-${color}-800 p-6 text-white`}>
                            <h3 className="text-xl font-bold flex items-center gap-2"><span className="text-2xl">{icon}</span>{title}</h3>
                        </div>
                        <div className="p-6">
                            <pre className="bg-gray-900 text-gray-300 rounded-xl p-4 text-xs font-mono overflow-x-auto mb-4 leading-relaxed max-h-48 overflow-y-auto">{text}</pre>
                            <div className="flex gap-3">
                                <Button variant={copied?'success':'primary'} className="flex-1" icon={copied?<Icon name="check" className="w-4 h-4"/>:<Icon name="copy" className="w-4 h-4"/>}
                                    onClick={()=>{navigator.clipboard.writeText(text);setCopied(true);showToast('تم النسخ!');setTimeout(()=>setCopied(false),2500);}}>
                                    {copied?'تم النسخ!':'نسخ البرومبت'}
                                </Button>
                                <Button variant="secondary" href={`https://claude.ai/new?q=${encodeURIComponent(text.slice(0,200))}`} icon={<Icon name="external" className="w-4 h-4"/>}>فتح في Claude</Button>
                            </div>
                        </div>
                    </div>
                );
            })}
        </div>
    );

    const renderScreens = () => (
        <div className="space-y-12 animate-fade-in">
            <div className="text-center">
                <h2 className="text-3xl font-bold font-heading mb-2">معرض الشاشات التفاعلي</h2>
                <p className="text-gray-600 dark:text-gray-400">اضغط على أي شاشة لتجربتها مباشرة</p>
            </div>
            {[{label:'شاشات المنزل الذكي',screens:APP_DATA.housingScreens,color:'emerald'},{label:'شاشات تتبع+',screens:APP_DATA.logisticsScreens,color:'amber'}].map(({label,screens,color})=>(
                <div key={label}>
                    <div className="flex items-center gap-4 mb-6">
                        <div className="h-px bg-gray-200 dark:bg-gray-700 flex-1"></div>
                        <h3 className={`text-xl font-bold text-${color}-600 dark:text-${color}-400`}>{label}</h3>
                        <div className="h-px bg-gray-200 dark:bg-gray-700 flex-1"></div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {screens.map(screen=>(
                            <button key={screen.id} onClick={()=>setSelectedScreen(screen)}
                                className={`aspect-[3/4] bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center p-4 hover:border-${color}-500 hover:shadow-lg transition-all group`}>
                                <div className={`w-12 h-12 bg-${color}-100 dark:bg-${color}-900/30 rounded-full flex items-center justify-center text-${color}-600 mb-3 group-hover:scale-110 transition-transform`}>
                                    <Icon name={color==='emerald'?'home':'layers'} className="w-6 h-6"/>
                                </div>
                                <span className="text-xs font-bold text-center text-gray-800 dark:text-gray-200">{screen.title}</span>
                                <span className="text-[10px] text-gray-400 mt-1">اضغط للتجربة</span>
                            </button>
                        ))}
                    </div>
                </div>
            ))}
        </div>
    );

    return (
        <div className={`min-h-screen flex flex-col ${darkMode?'dark':''}`}>
            {ToastEl}
            <header className="sticky top-0 z-40 glass-panel border-b border-gray-200 dark:border-gray-800 shadow-sm">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-16">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>handleTabChange('overview')}>
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg" style={{background:'linear-gradient(135deg,#2563eb,#1e40af)'}}>ع</div>
                            <div className="hidden sm:block">
                                <h1 className="text-lg font-bold leading-tight text-gray-900 dark:text-white font-heading">تطبيقات العراق الذكية</h1>
                                <p className="text-[10px] text-gray-500 dark:text-gray-400 font-mono">v3.0.0 | Interactive | <span className="text-blue-500 font-semibold">ENG_ALAA MOHAMMED</span></p>
                            </div>
                        </div>
                        <nav className="hidden md:flex space-x-1 space-x-reverse">
                            {APP_DATA.tabs.map(tab=>(
                                <button key={tab.id} onClick={()=>handleTabChange(tab.id)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeTab===tab.id?'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300':'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                    <span className="ml-2">{tab.icon}</span>{tab.label}
                                </button>
                            ))}
                        </nav>
                        <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                            <Icon name={darkMode?'sun':'moon'} className="w-5 h-5"/>
                        </button>
                    </div>
                </div>
            </header>

            <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8 w-full">
                {activeTab==='overview'   && renderOverview()}
                {activeTab==='housing'    && renderHousing()}
                {activeTab==='logistics'  && renderLogistics()}
                {activeTab==='prompts'    && renderPrompts()}
                {activeTab==='screens'    && renderScreens()}
            </main>

            <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 z-50">
                <div className="flex justify-around items-center h-16">
                    {APP_DATA.tabs.map(tab=>(
                        <button key={tab.id} onClick={()=>handleTabChange(tab.id)}
                            className={`flex flex-col items-center justify-center w-full h-full space-y-0.5 ${activeTab===tab.id?'text-blue-600 dark:text-blue-400':'text-gray-500 dark:text-gray-400'}`}>
                            <span className="text-xl">{tab.icon}</span>
                            <span className="text-[10px] font-medium">{tab.label}</span>
                        </button>
                    ))}
                </div>
            </nav>

            <footer className="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 py-6 mt-auto hidden md:block">
                <div className="max-w-7xl mx-auto px-4 text-center">
                    <p className="text-gray-500 dark:text-gray-400 text-sm">
                        © 2025 تطبيقات العراق الذكية | <span className="text-blue-500 font-bold">ENG_ALAA MOHAMMED</span>
                    </p>
                    <div className="flex justify-center gap-6 mt-3 flex-wrap">
                        <a href="https://reactnative.dev"           target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> React Native</a>
                        <a href="https://flutter.dev"               target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> Flutter</a>
                        <a href="https://firebase.google.com"       target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> Firebase</a>
                        <a href="https://www.zaincash.iq"           target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> ZainCash</a>
                        <a href="https://developers.google.com/maps" target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="external" className="w-3 h-3"/> Google Maps</a>
                        <a href="https://github.com"                target="_blank" className="text-xs text-gray-400 hover:text-blue-500 transition-colors flex items-center gap-1"><Icon name="github" className="w-3 h-3"/> GitHub</a>
                    </div>
                </div>
            </footer>

            <ScreenModal
                isOpen={!!selectedScreen}
                onClose={()=>setSelectedScreen(null)}
                data={selectedScreen}
                onDark={()=>setDarkMode(d=>!d)}
                dark={darkMode}
                onTabChange={handleTabChange}
            />
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
