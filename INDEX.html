<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Index File">
    <title>Repository Index</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(90deg, rgba(29, 29, 29, 1) 0%, rgba(52, 58, 64, 1) 50%);
            padding: 20px;
            text-align: center;
        }
        #search {
            margin: 20px 0;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 10px;
        }
        .filter {
            padding: 10px;
            background: #1E1E1E;
            margin: 10px;
            border-radius: 5px;
            flex: 1;
        }
        .card {
            background: #2A2A2A;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            transition: transform 0.3s;
            flex: 0 1 calc(30% - 20px);
        }
        .card:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #1E1E1E;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Repository</h1>
        <input type="text" id="search" placeholder="Search files..." onkeyup="filterFiles()">
    </header>
    <div class="container">
        <div class="filter">
            <h3>Category Filters</h3>
            <label><input type="checkbox" onchange="filterByType('js')"> JavaScript</label><br>
            <label><input type="checkbox" onchange="filterByType('css')"> CSS</label><br>
            <label><input type="checkbox" onchange="filterByType('html')"> HTML</label><br>
        </div>
        <div id="cards">
            <div class="card" data-type="js">
                <h4>script.js</h4>
                <p>Description of your JavaScript file.</p>
            </div>
            <div class="card" data-type="css">
                <h4>styles.css</h4>
                <p>Description of your CSS file.</p>
            </div>
            <div class="card" data-type="html">
                <h4>index.html</h4>
                <p>Description of your HTML file.</p>
            </div>
            <!-- Add more cards here -->
        </div>
    </div>
    <footer>
        <p>&copy; 2026 alaamohammed864 - All Rights Reserved</p>
    </footer>
    <script>
        function filterFiles() {
            const query = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.querySelector('h4').innerText.toLowerCase();
                if (title.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        function filterByType(type) {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                if (card.getAttribute('data-type') === type) {
                    card.style.display = card.style.display === 'none' ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
