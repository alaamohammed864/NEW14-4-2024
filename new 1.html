<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAM Degassing Station 3D Visualization</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js/r128/build/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        const light = new THREE.AmbientLight(0x404040); // soft white light
        scene.add(light);
        const pointLight = new THREE.PointLight(0xffffff);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Add 3D objects (representative examples)
        function createTank() {
            const geometry = new THREE.CylinderGeometry(1, 1, 3, 32);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            const tank = new THREE.Mesh(geometry, material);
            tank.position.set(0, 1.5, 0);
            scene.add(tank);
        }

        function createBuilding() {
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const building = new THREE.Mesh(geometry, material);
            building.position.set(5, 1, 0);
            scene.add(building);
        }

        createTank();
        createBuilding();

        // Camera position
        camera.position.z = 10;

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Responsive resizing
        window.addEventListener('resize', function () {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // Interaction controls
        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case 'ArrowUp': camera.position.z -= 0.5; break;
                case 'ArrowDown': camera.position.z += 0.5; break;
                case 'ArrowLeft': camera.position.x -= 0.5; break;
                case 'ArrowRight': camera.position.x += 0.5; break;
            }
        });
    </script>
</body>
</html>
