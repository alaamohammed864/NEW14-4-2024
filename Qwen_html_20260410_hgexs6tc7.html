<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&ID Interactive Viewer - PENNLEX System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Roboto+Mono:wght@300;400;500;700&display=swap');

  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-card-hover: #1e2a42;
    --border-color: #2a3a5c;
    --accent-blue: #3b82f6;
    --accent-cyan: #06b6d4;
    --accent-green: #10b981;
    --accent-orange: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #8b5cf6;
    --accent-pink: #ec4899;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --pipe-color: #3b82f6;
    --pipe-gas: #f59e0b;
    --pipe-liquid: #10b981;
    --pipe-water: #06b6d4;
    --shadow-lg: 0 10px 40px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 20px rgba(59,130,246,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', 'Roboto Mono', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(135deg, #111827 0%, #1a2235 100%);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
    backdrop-filter: blur(10px);
  }

  .top-bar .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 18px;
  }

  .top-bar .logo svg { width: 32px; height: 32px; }

  .top-bar .title-group {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .top-bar .title-group .tag {
    background: rgba(59,130,246,0.15);
    color: var(--accent-blue);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(59,130,246,0.3);
  }

  .top-bar .actions {
    display: flex;
    gap: 8px;
  }

  .top-bar .actions button {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .top-bar .actions button:hover {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
  }

  .top-bar .actions button.active {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    position: fixed;
    top: 56px;
    right: 0;
    width: 320px;
    height: calc(100vh - 56px);
    background: var(--bg-secondary);
    border-left: 1px solid var(--border-color);
    z-index: 900;
    overflow-y: auto;
    transition: transform 0.3s ease;
    padding: 16px;
  }

  .sidebar.collapsed { transform: translateX(100%); }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: var(--bg-primary); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  .sidebar-section {
    margin-bottom: 20px;
  }

  .sidebar-section h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent-cyan);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .equip-item {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .equip-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent-blue);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .equip-item:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-blue);
    transform: translateX(-4px);
  }

  .equip-item:hover::before { opacity: 1; }

  .equip-item.selected {
    border-color: var(--accent-cyan);
    background: rgba(6,182,212,0.1);
  }

  .equip-item.selected::before {
    opacity: 1;
    background: var(--accent-cyan);
  }

  .equip-item .eq-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .equip-item .eq-tag {
    font-family: 'Roboto Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--accent-blue);
  }

  .equip-item .eq-status {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px rgba(16,185,129,0.5);
    animation: pulse-status 2s infinite;
  }

  .equip-item .eq-status.warning {
    background: var(--accent-orange);
    box-shadow: 0 0 8px rgba(245,158,11,0.5);
  }

  .equip-item .eq-status.alarm {
    background: var(--accent-red);
    box-shadow: 0 0 8px rgba(239,68,68,0.5);
  }

  @keyframes pulse-status {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .equip-item .eq-name {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .equip-item .eq-params {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }

  .equip-item .eq-param {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Roboto Mono', monospace;
  }

  .equip-item .eq-param span {
    color: var(--text-primary);
    font-weight: 600;
  }

  /* ===== DETAIL PANEL ===== */
  .detail-panel {
    position: fixed;
    top: 56px;
    left: 20px;
    width: 340px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    z-index: 950;
    padding: 0;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    transition: all 0.4s ease;
    transform: translateY(120%);
    opacity: 0;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .detail-panel.visible {
    transform: translateY(0);
    opacity: 1;
  }

  .detail-panel .detail-header {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    padding: 20px;
    position: relative;
  }

  .detail-panel .detail-header .close-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }

  .detail-panel .detail-header .close-btn:hover {
    background: rgba(255,255,255,0.4);
  }

  .detail-panel .detail-header .eq-type {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .detail-panel .detail-header .eq-id {
    font-family: 'Roboto Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: white;
  }

  .detail-panel .detail-header .eq-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    margin-top: 4px;
  }

  .detail-panel .detail-body {
    padding: 20px;
  }

  .detail-panel .param-group {
    margin-bottom: 16px;
  }

  .detail-panel .param-group-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-cyan);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .detail-panel .param-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(42,58,92,0.5);
  }

  .detail-panel .param-row .label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .detail-panel .param-row .value {
    font-family: 'Roboto Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .detail-panel .param-row .value.good { color: var(--accent-green); }
  .detail-panel .param-row .value.warn { color: var(--accent-orange); }
  .detail-panel .param-row .value.bad { color: var(--accent-red); }

  .detail-panel .mini-chart {
    background: var(--bg-card);
    border-radius: 10px;
    padding: 12px;
    margin-top: 8px;
  }

  .detail-panel .mini-chart canvas {
    width: 100%;
    height: 80px;
  }

  /* ===== MAIN CANVAS AREA ===== */
  .canvas-container {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  .canvas-container:active { cursor: grabbing; }

  .canvas-container.dragging { cursor: grabbing; }

  .pid-svg {
    width: 100%;
    height: 100%;
    transform-origin: 0 0;
    transition: transform 0.1s ease-out;
  }

  /* ===== SVG STYLES ===== */
  .pipe-line {
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .pipe-line.gas { stroke: var(--pipe-gas); }
  .pipe-line.liquid { stroke: var(--pipe-liquid); }
  .pipe-line.water { stroke: var(--pipe-water); }
  .pipe-line.refrigerant { stroke: var(--pipe-color); }
  .pipe-line.condensate { stroke: var(--accent-purple); }

  .pipe-line-animated {
    stroke-dasharray: 8 4;
    animation: flowDash 1s linear infinite;
  }

  @keyframes flowDash {
    to { stroke-dashoffset: -12; }
  }

  .equip-shape {
    fill: var(--bg-card);
    stroke: var(--border-color);
    stroke-width: 2;
    cursor: pointer;
    transition: all 0.3s;
  }

  .equip-shape:hover {
    stroke: var(--accent-cyan);
    fill: rgba(6,182,212,0.1);
    filter: drop-shadow(0 0 8px rgba(6,182,212,0.4));
  }

  .equip-shape.selected {
    stroke: var(--accent-cyan);
    stroke-width: 3;
    filter: drop-shadow(0 0 12px rgba(6,182,212,0.6));
  }

  .equip-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    fill: var(--text-primary);
    pointer-events: none;
  }

  .equip-label-small {
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    fill: var(--text-secondary);
    pointer-events: none;
  }

  .valve-shape {
    fill: var(--bg-card);
    stroke: var(--accent-orange);
    stroke-width: 2;
    cursor: pointer;
    transition: all 0.3s;
  }

  .valve-shape:hover {
    stroke: var(--accent-red);
    fill: rgba(239,68,68,0.15);
  }

  .instrument-circle {
    fill: var(--bg-secondary);
    stroke: var(--accent-blue);
    stroke-width: 2;
    cursor: pointer;
    transition: all 0.3s;
  }

  .instrument-circle:hover {
    stroke: var(--accent-cyan);
    fill: rgba(6,182,212,0.15);
  }

  .instrument-text {
    font-family: 'Roboto Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    fill: var(--text-primary);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .flange-marker {
    fill: var(--text-muted);
  }

  .flow-arrow {
    fill: var(--text-secondary);
    opacity: 0.6;
  }

  /* ===== ZOOM CONTROLS ===== */
  .zoom-controls {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 900;
  }

  .zoom-controls button {
    width: 44px;
    height: 44px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    color: var(--text-primary);
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    box-shadow: var(--shadow-lg);
  }

  .zoom-controls button:hover {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
  }

  .zoom-level {
    text-align: center;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-card);
    padding: 6px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
  }

  /* ===== LEGEND ===== */
  .legend-panel {
    position: fixed;
    bottom: 24px;
    right: 340px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    z-index: 900;
    min-width: 220px;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s;
  }

  .legend-panel.collapsed { transform: translateY(100%); }

  .legend-panel h4 {
    font-size: 13px;
    color: var(--accent-cyan);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-item .swatch {
    width: 24px;
    height: 4px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ===== SEARCH ===== */
  .search-box {
    position: relative;
    margin-bottom: 16px;
  }

  .search-box input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 10px 14px 10px 36px;
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.3s;
  }

  .search-box input:focus {
    border-color: var(--accent-blue);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-box .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  /* ===== MINIMAP ===== */
  .minimap {
    position: fixed;
    bottom: 24px;
    left: 90px;
    width: 200px;
    height: 140px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    z-index: 900;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .minimap .viewport-rect {
    stroke: var(--accent-cyan);
    stroke-width: 2;
    fill: rgba(6,182,212,0.1);
  }

  /* ===== TOOLTIP ===== */
  .tooltip {
    position: fixed;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 2000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: var(--shadow-lg);
    max-width: 250px;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-tag {
    font-family: 'Roboto Mono', monospace;
    font-weight: 700;
    color: var(--accent-blue);
    font-size: 13px;
  }

  .tooltip .tt-desc {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .tooltip .tt-value {
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: var(--accent-green);
    margin-top: 6px;
  }

  /* ===== ALARM BANNER ===== */
  .alarm-banner {
    position: fixed;
    top: 56px;
    left: 0; right: 0;
    background: linear-gradient(90deg, rgba(239,68,68,0.2), rgba(239,68,68,0.1));
    border-bottom: 1px solid rgba(239,68,68,0.3);
    padding: 8px 20px;
    z-index: 999;
    display: none;
    align-items: center;
    gap: 12px;
    animation: alarmPulse 1s infinite;
  }

  .alarm-banner.active { display: flex; }

  @keyframes alarmPulse {
    0%, 100% { background: linear-gradient(90deg, rgba(239,68,68,0.2), rgba(239,68,68,0.1)); }
    50% { background: linear-gradient(90deg, rgba(239,68,68,0.3), rgba(239,68,68,0.2)); }
  }

  .alarm-banner .alarm-icon {
    width: 24px; height: 24px;
    color: var(--accent-red);
    animation: rotate 2s linear infinite;
  }

  @keyframes rotate {
    to { transform: rotate(360deg); }
  }

  .alarm-banner .alarm-text {
    font-size: 13px;
    color: var(--accent-red);
    font-weight: 600;
  }

  .alarm-banner .alarm-dismiss {
    margin-right: auto;
    background: none;
    border: 1px solid rgba(239,68,68,0.5);
    color: var(--accent-red);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
  }

  /* ===== FLOW PARTICLES ===== */
  .flow-particle {
    fill: rgba(255,255,255,0.6);
    pointer-events: none;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .sidebar { width: 260px; }
    .legend-panel { display: none; }
    .minimap { display: none; }
    .detail-panel { width: 90vw; left: 5vw; }
  }

  /* ===== ANIMATIONS ===== */
  .fade-in {
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .glow-pulse {
    animation: glowPulse 2s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(6,182,212,0.3)); }
    50% { filter: drop-shadow(0 0 12px rgba(6,182,212,0.6)); }
  }

  /* Grid background */
  .grid-bg {
    fill: url(#gridPattern);
  }

  /* Connection dot */
  .conn-dot {
    fill: var(--accent-cyan);
    r: 3;
  }

  /* Valve position indicator */
  .valve-open { stroke: var(--accent-green); }
  .valve-closed { stroke: var(--accent-red); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="#3b82f6" stroke-width="2"/>
      <path d="M10 16h12M16 10v12M12 12l8 8M20 12l-8 8" stroke="#06b6d4" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="3" fill="#3b82f6"/>
    </svg>
    <span>P&ID <span style="color:var(--accent-cyan)">Interactive</span></span>
  </div>
  <div class="title-group">
    <span class="tag">PENNLEX SYSTEM</span>
    <span class="tag" style="background:rgba(16,185,129,0.15);color:var(--accent-green);border-color:rgba(16,185,129,0.3)">LIVE</span>
    <span class="tag" style="background:rgba(139,92,246,0.15);color:var(--accent-purple);border-color:rgba(139,92,246,0.3)">REV. B</span>
  </div>
  <div class="actions">
    <button onclick="toggleSidebar()" id="sidebarBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="2" x2="6" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>
      القائمة
    </button>
    <button onclick="toggleLegend()" id="legendBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="3" rx="1" fill="#f59e0b"/><rect x="2" y="6.5" width="12" height="3" rx="1" fill="#10b981"/><rect x="2" y="11" width="12" height="3" rx="1" fill="#06b6d4"/></svg>
      المفتاح
    </button>
    <button onclick="resetView()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 0110.5-4M14 8a6 6 0 01-10.5 4"/><path d="M12.5 2v3H9.5M3.5 14v-3h3"/></svg>
      إعادة ضبط
    </button>
    <button onclick="toggleFullscreen()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg>
      شاشة كاملة
    </button>
  </div>
</div>

<!-- ALARM BANNER -->
<div class="alarm-banner" id="alarmBanner">

// ===== STATE =====
let currentZoom = 1;
let currentPanX = 0;
let currentPanY = 0;
let isDragging = false;
let dragStartX, dragStartY;
let selectedEquip = null;

// ===== INITIALIZATION =====
function init() {
  buildSidebar();
  setupInteractions();
  setupPanZoom();
  setupTooltips();
  animateFlowParticles();

  // Show alarm after 3 seconds
  setTimeout(() => {
    document.getElementById('alarmBanner').classList.add('active');
  }, 3000);
}

// ===== BUILD SIDEBAR =====
function buildSidebar() {
  const compressors = ['C-101', 'C-102'];
  const heatExchangers = ['E-101', 'E-102', 'E-103', 'E-104'];
  const valves = ['HV-101', 'HV-102', 'FCV-101', 'XV-101', 'PSV-101', 'CV-101'];
  const instruments = ['TI-101', 'TI-102', 'PI-101', 'PI-102', 'PIC-101', 'TIC-101', 'FI-101', 'LI-101', 'FIC-101', 'PSH-101', 'PSL-101', 'VI-101'];
  const vessels = ['V-101', 'V-102', 'V-103'];

  buildEquipList('compressorList', compressors, ['compressor']);
  buildEquipList('heatExchangerList', heatExchangers, ['heatExchanger']);
  buildEquipList('valveList', valves, ['valve']);
  buildEquipList('instrumentList', instruments, ['instrument']);
  buildEquipList('vesselList', vessels, ['vessel']);
}

function buildEquipList(containerId, tags, classes) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  tags.forEach(tag => {
    const eq = equipmentData[tag];
    if (!eq) return;
    const item = document.createElement('div');
    item.className = 'equip-item fade-in';
    item.dataset.tag = tag;
    item.onclick = () => selectEquipment(tag);

    const statusClass = eq.status === 'running' || eq.status === 'active' || eq.status === 'open' ? '' :
                        eq.status === 'warn' || eq.status === 'standby' ? 'warning' : '';

    item.innerHTML = `
      <div class="eq-header">
        <span class="eq-tag">${tag}</span>
        <span class="eq-status ${statusClass}"></span>
      </div>
      <div class="eq-name">${eq.name}</div>
      <div class="eq-params">
        ${Object.entries(eq.params).slice(0, 4).map(([k, v]) =>
          `<div class="eq-param">${k}: <span>${v.value}</span></div>`
        ).join('')}
      </div>
    `;
    container.appendChild(item);
  });
}

// ===== SELECT EQUIPMENT =====
function selectEquipment(tag) {
  // Update sidebar selection
  document.querySelectorAll('.equip-item').forEach(item => {
    item.classList.toggle('selected', item.dataset.tag === tag);
  });

  // Update SVG selection
  document.querySelectorAll('.equip-group').forEach(g => {
    const el = g.querySelector('.equip-shape, .instrument-circle');
    if (el) {
      el.classList.toggle('selected', g.dataset.eq === tag);
    }
  });

  selectedEquip = tag;

  // Show detail panel
  const eq = equipmentData[tag];
  if (!eq) return;

  const panel = document.getElementById('detailPanel');
  const header = document.getElementById('detailHeader');
  const body = document.getElementById('detailBody');

  document.getElementById('detailType').textContent = eq.type;
  document.getElementById('detailId').textContent = tag;
  document.getElementById('detailDesc').textContent = eq.desc;

  // Build params
  let paramsHTML = `
    <div class="param-group">
      <div class="param-group-title">المعاملات التشغيلية</div>
      ${Object.entries(eq.params).map(([k, v]) => `
        <div class="param-row">
          <span class="label">${k}</span>
          <span class="value ${v.status}">${v.value}</span>
        </div>
      `).join('')}
    </div>
  `;

  // Add mini chart for some equipment
  if (['C-101', 'E-101', 'E-102'].includes(tag)) {
    paramsHTML += `
      <div class="param-group">
        <div class="param-group-title">الرسم البياني (آخر ساعة)</div>
        <div class="mini-chart">
          <canvas id="miniChart" width="300" height="80"></canvas>
        </div>
      </div>
    `;
  }

  // Add related instruments
  if (eq.tags && eq.tags.length > 1) {
    paramsHTML += `
      <div class="param-group">
        <div class="param-group-title">الأجهزة المرتبطة</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${eq.tags.filter(t => t !== tag).map(t => `
            <span style="background:var(--bg-card);border:1px solid var(--border-color);padding:4px 10px;border-radius:6px;font-family:'Roboto Mono',monospace;font-size:11px;cursor:pointer;color:var(--accent-blue);" 
                  onclick="selectEquipment('${t}')">${t}</span>
          `).join('')}
        </div>
      </div>
    `;
  }

  body.innerHTML = paramsHTML;
  panel.classList.add('visible');

  // Draw mini chart
  if (['C-101', 'E-101', 'E-102'].includes(tag)) {
    setTimeout(() => drawMiniChart(tag), 100);
  }
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
  document.querySelectorAll('.equip-item').forEach(item => item.classList.remove('selected'));
  document.querySelectorAll('.equip-group').forEach(g => {
    const el = g.querySelector('.equip-shape, .instrument-circle');
    if (el) el.classList.remove('selected');
  });
  selectedEquip = null;
}

// ===== MINI CHART =====
function drawMiniChart(tag) {
  const canvas = document.getElementById('miniChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  // Generate random data
  const points = 30;
  const data = [];
  let val = 50;
  for (let i = 0; i < points; i++) {
    val += (Math.random() - 0.5) * 15;
    val = Math.max(10, Math.min(90, val));
    data.push(val);
  }

  // Draw grid
  ctx.strokeStyle = 'rgba(42,58,92,0.5)';
  ctx.lineWidth = 0.5;
  for (let y = 0; y < h; y += 20) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Draw line
  const gradient = ctx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, 'rgba(59,130,246,0.3)');
  gradient.addColorStop(1, 'rgba(59,130,246,0)');

  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let i = 0; i < data.length; i++) {
    const x = (i / (data.length - 1)) * w;
    const y = h - (data[i] / 100) * h;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i / (data.length - 1)) * w;
    const y = h - (data[i] / 100) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw last point
  const lastX = w;
  const lastY = h - (data[data.length - 1] / 100) * h;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#3b82f6';
  ctx.fill();
}

// ===== PAN & ZOOM =====
function setupPanZoom() {
  const container = document.getElementById('canvasContainer');

  container.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX - currentPanX;
    dragStartY = e.clientY - currentPanY;
    container.classList.add('dragging');
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    currentPanX = e.clientX - dragStartX;
    currentPanY = e.clientY - dragStartY;
    updateTransform();
    updateMinimap();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    document.getElementById('canvasContainer').classList.remove('dragging');
  });

  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    currentZoom = Math.max(0.3, Math.min(3, currentZoom + delta));
    updateTransform();
    updateMinimap();
  }, { passive: false });

  // Touch support
  let lastTouchDist = 0;
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      dragStartX = e.touches[0].clientX - currentPanX;
      dragStartY = e.touches[0].clientY - currentPanY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });

  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      currentPanX = e.touches[0].clientX - dragStartX;
      currentPanY = e.touches[0].clientY - dragStartY;
      updateTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = (dist - lastTouchDist) * 0.005;
      currentZoom = Math.max(0.3, Math.min(3, currentZoom + delta));
      lastTouchDist = dist;
      updateTransform();
    }
  }, { passive: false });

  container.addEventListener('touchend', () => { isDragging = false; });
}

function updateTransform() {
  const svg = document.getElementById('pidSvg');
  svg.style.transform = `translate(${currentPanX}px, ${currentPanY}px) scale(${currentZoom})`;
  document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
}

function updateMinimap() {
  const rect = document.getElementById('viewportRect');
  const container = document.getElementById('canvasContainer');
  const viewW = container.clientWidth / currentZoom;
  const viewH = container.clientHeight / currentZoom;
  const viewX = -currentPanX / currentZoom;
  const viewY = -currentPanY / currentZoom;

  rect.setAttribute('x', Math.max(0, viewX));
  rect.setAttribute('y', Math.max(0, viewY));
  rect.setAttribute('width', Math.min(1600, viewW));
  rect.setAttribute('height', Math.min(900, viewH));
}

function zoomIn() {
  currentZoom = Math.min(3, currentZoom + 0.2);
  updateTransform();
  updateMinimap();
}

function zoomOut() {
  currentZoom = Math.max(0.3, currentZoom - 0.2);
  updateTransform();
  updateMinimap();
}

function resetView() {
  currentZoom = 1;
  currentPanX = 0;
  currentPanY = 0;
  updateTransform();
  updateMinimap();
}

// ===== TOOLTIPS =====
function setupTooltips() {
  const tooltip = document.getElementById('tooltip');
  const container = document.getElementById('canvasContainer');

  document.querySelectorAll('.equip-group').forEach(group => {
    const tag = group.dataset.eq;
    const eq = equipmentData[tag];
    if (!eq) return;

    group.addEventListener('mouseenter', (e) => {
      document.getElementById('ttTag').textContent = tag;
      document.getElementById('ttDesc').textContent = eq.name;

      const firstParam = Object.entries(eq.params)[0];
      document.getElementById('ttValue').textContent = `${firstParam[0]}: ${firstParam[1].value}`;

      tooltip.classList.add('visible');
    });

    group.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 15) + 'px';
    });

    group.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });
  });
}

// ===== FLOW PARTICLES =====
function animateFlowParticles() {
  const svg = document.getElementById('pidSvg');
  const ns = 'http://www.w3.org/2000/svg';

  const paths = [
    'M 100 150 L 400 150 L 500 150 L 500 200',
    'M 550 200 L 650 200 L 650 100 L 800 100',
    'M 900 100 L 1000 100 L 1000 150 L 1050 150',
    'M 1300 150 L 1400 150 L 1400 80 L 500 80 L 500 150',
    'M 450 600 L 600 600 L 600 500',
    'M 1400 600 L 1400 500 L 500 500'
  ];

  paths.forEach((pathD, idx) => {
    for (let i = 0; i < 3; i++) {
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('r', '3');
      circle.setAttribute('fill', idx % 2 === 0 ? 'rgba(59,130,246,0.8)' : 'rgba(16,185,129,0.8)');
      circle.classList.add('flow-particle');

      const animateMotion = document.createElementNS(ns, 'animateMotion');
      animateMotion.setAttribute('dur', (4 + Math.random() * 3) + 's');
      animateMotion.setAttribute('repeatCount', 'indefinite');
      animateMotion.setAttribute('path', pathD);
      animateMotion.setAttribute('begin', (i * 1.5) + 's');

      circle.appendChild(animateMotion);
      svg.appendChild(circle);
    }
  });
}

// ===== SEARCH =====
function searchEquipment(query) {
  query = query.toLowerCase();
  document.querySelectorAll('.equip-item').forEach(item => {
    const tag = item.dataset.tag.toLowerCase();
    const eq = equipmentData[item.dataset.tag];
    const name = eq ? eq.name.toLowerCase() : '';
    const desc = eq ? eq.desc.toLowerCase() : '';
    const match = tag.includes(query) || name.includes(query) || desc.includes(query);
    item.style.display = match ? 'block' : 'none';
  });
}

// ===== TOGGLE SIDEBAR =====
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
  document.getElementById('sidebarBtn').classList.toggle('active');
}

// ===== TOGGLE LEGEND =====
function toggleLegend() {
  document.getElementById('legendBtn').classList.toggle('active');
}

// ===== FULLSCREEN =====
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ===== DISMISS ALARM =====
function dismissAlarm() {
  document.getElementById('alarmBanner').classList.remove('active');
}

// ===== SIMULATE LIVE DATA =====
function simulateLiveData() {
  setInterval(() => {
    if (selectedEquip && equipmentData[selectedEquip]) {
      const eq = equipmentData[selectedEquip];
      Object.keys(eq.params).forEach(key => {
        const param = eq.params[key];
        if (param.value.includes('bar') && !param.value.includes('0')) {
          const current = parseFloat(param.value);
          if (!isNaN(current)) {
            const variation = (Math.random() - 0.5) * 0.3;
            const newVal = (current + variation).toFixed(1);
            param.value = newVal + ' bar';
            param.status = newVal > 5 ? 'warn' : 'good';
          }
        } else if (param.value.includes('°C') && !param.value.includes('--')) {
          const current = parseFloat(param.value);
          if (!isNaN(current)) {
            const variation = (Math.random() - 0.5) * 1.5;
            const newVal = (current + variation).toFixed(1);
            param.value = newVal + '°C';
          }
        } else if (param.value.includes('kg/s') && !param.value.includes('0')) {
          const current = parseFloat(param.value);
          if (!isNaN(current)) {
            const variation = (Math.random() - 0.5) * 0.5;
            const newVal = (current + variation).toFixed(1);
            param.value = newVal + ' kg/s';
          }
        }
      });

      // Update display if panel is open
      const panel = document.getElementById('detailPanel');
      if (panel.classList.contains('visible')) {
        selectEquipment(selectedEquip);
      }
    }

    // Update sidebar items
    document.querySelectorAll('.equip-item').forEach(item => {
      const tag = item.dataset.tag;
      const eq = equipmentData[tag];
      if (eq) {
        const params = item.querySelectorAll('.eq-param span');
        let i = 0;
        Object.values(eq.params).slice(0, 4).forEach(v => {
          if (params[i]) params[i].textContent = v.value;
          i++;
        });
      }
    });
  }, 2000);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeDetail();
  } else if (e.key === '+' || e.key === '=') {
    zoomIn();
  } else if (e.key === '-') {
    zoomOut();
  } else if (e.key === '0') {
    resetView();
  } else if (e.key === 'f' && e.ctrlKey) {
    e.preventDefault();
    document.querySelector('.search-box input').focus();
  }
});

// ===== START =====
window.addEventListener('load', () => {
  init();
  simulateLiveData();
  updateMinimap();
});
</script>
