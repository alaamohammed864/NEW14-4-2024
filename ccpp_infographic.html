<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Gas Combined Cycle Power Plant — Technical Infographic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1b2a;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 20px;
    color: white;
  }
  .page-header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e8f4fd;
  }
  .page-header p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #7cb9e8;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .diagram-container {
    background: linear-gradient(160deg, #e8f0f7 0%, #d4e5f5 40%, #c8dff0 100%);
    border-radius: 12px;
    padding: 30px;
    width: 100%;
    max-width: 1200px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
  }

  .diagram-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(200,225,245,0.3) 0%, transparent 50%);
    pointer-events: none;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-top: 16px;
    background: rgba(13,27,42,0.85);
    border-radius: 8px;
    padding: 12px 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: #cde;
    letter-spacing: 0.5px;
  }
  .legend-line {
    width: 32px;
    height: 3px;
    border-radius: 2px;
  }

  svg text {
    font-family: 'Barlow Condensed', 'Barlow', sans-serif;
  }

  @keyframes steam {
    0%   { opacity: 0.7; transform: translateY(0) scaleX(1); }
    50%  { opacity: 0.4; transform: translateY(-18px) scaleX(1.3); }
    100% { opacity: 0; transform: translateY(-36px) scaleX(1.6); }
  }
  @keyframes steam2 {
    0%   { opacity: 0.6; transform: translateY(0) scaleX(1); }
    50%  { opacity: 0.3; transform: translateY(-22px) scaleX(1.4); }
    100% { opacity: 0; transform: translateY(-44px) scaleX(1.8); }
  }
  .steam-puff { animation: steam 3s ease-out infinite; }
  .steam-puff2 { animation: steam2 3.5s ease-out infinite 0.8s; }
  .steam-puff3 { animation: steam 2.8s ease-out infinite 1.5s; }

  @keyframes elec-pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .elec-pulse { animation: elec-pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Natural Gas Combined Cycle Power Plant</h1>
  <p>ENGINEERING SYSTEMS OVERVIEW — AERIAL ISOMETRIC DIAGRAM</p>
</div>

<div class="diagram-container">
